install_resources:
  name: Ressourcen installieren oder exportieren
  description: Kopiert Blueprint und Dashboard-Dateien aus der Integration in das Home-Assistant-Konfigurationsverzeichnis.
  fields:
    config_entry_id:
      name: Konfigurationseintrag-ID
      description: Optionale ID eines Konfigurationseintrags, wenn gezielt ein bestimmter Eintrag angesprochen werden soll.
      selector:
        text:
    install_blueprint:
      name: Blueprint installieren
      description: Exportiert das Automations-Blueprint in den Blueprint-Ordner.
      selector:
        boolean:
    export_dashboard_snippets:
      name: Dashboard-Dateien exportieren
      description: Exportiert die Dashboard-YAML-Dateien nach /config/kuehlgeraet_cockpit/dashboard/.
      selector:
        boolean:
    overwrite_existing:
      name: Vorhandene Dateien ueberschreiben
      description: Ersetzt Dateien, die am Zielpfad bereits vorhanden sind.
      selector:
        boolean:

set_dashboard_status:
  name: Dashboard-Status setzen
  description: Aktualisiert den Live-Statussensor von Kuehlgeraet Cockpit aus einer Automation.
  fields:
    status_json:
      name: Status-JSON
      description: Kompaktes JSON-Objekt mit dem aktuellen Kuehlstatus.
      required: true
      selector:
        text:
          multiline: true