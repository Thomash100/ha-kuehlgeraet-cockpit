type: vertical-stack
cards:
  - type: custom:button-card
    entity: sensor.kuehlgeraet_cockpit_status
    show_name: false
    show_state: false
    show_icon: false
    tap_action:
      action: more-info
    hold_action:
      action: more-info
    styles:
      card:
        - padding: 18px 20px
        - border-radius: 20px
        - border: 1px solid rgba(148, 228, 255, 0.20)
        - background: linear-gradient(135deg, rgba(6,18,30,0.95), rgba(12,37,55,0.88))
        - box-shadow: 0 18px 36px rgba(0,0,0,0.28)
      grid:
        - grid-template-areas: 'panel'
        - grid-template-columns: 1fr
      custom_fields:
        panel:
          - justify-self: stretch
          - align-self: stretch
    custom_fields:
      panel: |
        [[[ 
          const data = entity?.attributes || {};
          const safe = (v, fallback='-') => (v === undefined || v === null || v === '') ? fallback : v;
          const trend = String(safe(data.price_trend, 'unknown')).toLowerCase();
          const accent = trend === 'rising_soon' ? '#ffb08a' : (trend === 'falling_soon' ? '#7fffd2' : '#8fe7ff');
          return `
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;color:#eef8ff;font-family:Consolas, 'Courier New', monospace;">
              <div>
                <div style="font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:rgba(220,245,255,0.72);">Kuehlgeraet Technikpanel</div>
                <div style="margin-top:6px;font-size:30px;font-weight:800;letter-spacing:0.04em;color:${accent};">${String(safe(data.mode, entity?.state || 'idle')).toUpperCase()}</div>
                <div style="margin-top:8px;font-size:13px;color:rgba(235,248,255,0.84);">Letztes Update: ${safe(data.updated)}</div>
              </div>
              <div style="display:grid;grid-template-columns:repeat(3, minmax(88px, 1fr));gap:10px;min-width:min(100%, 360px);">
                <div style="padding:10px 12px;border-radius:14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.08);">
                  <div style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.68;">Temp</div>
                  <div style="margin-top:4px;font-size:22px;font-weight:800;">${safe(data.temperature_c)} C</div>
                </div>
                <div style="padding:10px 12px;border-radius:14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.08);">
                  <div style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.68;">Leistung</div>
                  <div style="margin-top:4px;font-size:22px;font-weight:800;">${safe(data.power_w)} W</div>
                </div>
                <div style="padding:10px 12px;border-radius:14px;background:${(data.cheap_slot === true || String(data.cheap_slot).toLowerCase() === 'true') ? 'rgba(86,214,159,0.20)' : 'rgba(255,255,255,0.08)'};border:1px solid rgba(255,255,255,0.08);">
                  <div style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.68;">Preisfenster</div>
                  <div style="margin-top:4px;font-size:16px;font-weight:800;">${(data.cheap_slot === true || String(data.cheap_slot).toLowerCase() === 'true') ? 'GUENSTIG' : 'NORMAL'}</div>
                </div>
              </div>
            </div>`;
        ]]]

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:button-card
        entity: sensor.kuehlgeraet_cockpit_status
        show_name: false
        show_state: false
        show_icon: false
        styles:
          card:
            - padding: 16px
            - border-radius: 20px
            - border: 1px solid rgba(255,255,255,0.10)
            - background: linear-gradient(180deg, rgba(18,24,33,0.96), rgba(11,16,22,0.96))
          grid:
            - grid-template-areas: 'body'
            - grid-template-columns: 1fr
          custom_fields:
            body:
              - justify-self: stretch
              - align-self: stretch
        custom_fields:
          body: |
            [[[ 
              const data = entity?.attributes || {};
              const safe = (v, fallback='-') => (v === undefined || v === null || v === '') ? fallback : v;
              const trend = String(safe(data.price_trend, 'unknown')).toLowerCase();
              const cheap = data.cheap_slot === true || String(data.cheap_slot).toLowerCase() === 'true';
              return `
                <div style="font-family:Consolas, 'Courier New', monospace;color:#eef8ff;">
                  <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
                    <div style="font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#ffd88b;">Preismodul</div>
                    <ha-icon icon="mdi:cash-clock" style="width:18px;height:18px;color:#ffd88b;"></ha-icon>
                  </div>
                  <div style="margin-top:14px;display:grid;grid-template-columns:repeat(2, minmax(0,1fr));gap:10px;">
                    <div style="padding:10px;border-radius:14px;background:rgba(255,255,255,0.06);">
                      <div style="font-size:10px;opacity:0.68;text-transform:uppercase;">Aktuell</div>
                      <div style="margin-top:4px;font-size:18px;font-weight:800;">${safe(data.price)}</div>
                    </div>
                    <div style="padding:10px;border-radius:14px;background:${cheap ? 'rgba(86,214,159,0.18)' : 'rgba(255,255,255,0.06)'};">
                      <div style="font-size:10px;opacity:0.68;text-transform:uppercase;">Billigfenster</div>
                      <div style="margin-top:4px;font-size:18px;font-weight:800;">${cheap ? 'AKTIV' : 'AUS'}</div>
                    </div>
                  </div>
                  <div style="margin-top:12px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Bester Preis</span><span style="font-weight:700;">${safe(data.best_price_next_hours)}</span></div>
                  <div style="margin-top:6px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Uhrzeit</span><span style="font-weight:700;">${safe(data.best_price_slot_next_hours)}</span></div>
                  <div style="margin-top:6px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Trend</span><span style="font-weight:700;">${safe(data.price_trend)}</span></div>
                  <div style="margin-top:12px;padding:10px;border-radius:14px;background:rgba(255,255,255,0.06);font-size:12px;line-height:1.5;">
                    <div style="font-size:10px;opacity:0.68;text-transform:uppercase;">Billigste Slots</div>
                    <div style="margin-top:6px;">${safe(data.cheapest_slots_summary)}</div>
                  </div>
                </div>`;
            ]]]

      - type: custom:button-card
        entity: sensor.kuehlgeraet_cockpit_status
        show_name: false
        show_state: false
        show_icon: false
        styles:
          card:
            - padding: 16px
            - border-radius: 20px
            - border: 1px solid rgba(255,255,255,0.10)
            - background: linear-gradient(180deg, rgba(15,30,39,0.96), rgba(9,18,25,0.96))
          grid:
            - grid-template-areas: 'body'
            - grid-template-columns: 1fr
          custom_fields:
            body:
              - justify-self: stretch
              - align-self: stretch
        custom_fields:
          body: |
            [[[ 
              const data = entity?.attributes || {};
              const safe = (v, fallback='-') => (v === undefined || v === null || v === '') ? fallback : v;
              const running = data.compressor_running === true || String(data.compressor_running).toLowerCase() === 'true';
              return `
                <div style="font-family:Consolas, 'Courier New', monospace;color:#eef8ff;">
                  <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
                    <div style="font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#9de8ff;">Kompressormodul</div>
                    <ha-icon icon="mdi:engine-outline" style="width:18px;height:18px;color:#9de8ff;"></ha-icon>
                  </div>
                  <div style="margin-top:14px;padding:12px;border-radius:14px;background:${running ? 'rgba(111,255,194,0.16)' : 'rgba(255,255,255,0.06)'};">
                    <div style="font-size:10px;opacity:0.68;text-transform:uppercase;">Status</div>
                    <div style="margin-top:4px;font-size:20px;font-weight:800;">${running ? 'LAEUFT' : 'RUHIG'}</div>
                  </div>
                  <div style="margin-top:12px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Leistung</span><span style="font-weight:700;">${safe(data.power_w)} W</span></div>
                  <div style="margin-top:6px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Schwellwert</span><span style="font-weight:700;">${safe(data.compressor_running_watts)} W</span></div>
                  <div style="margin-top:6px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Relais</span><span style="font-weight:700;">${safe(data.switch_state)} -> ${safe(data.target_switch_state)}</span></div>
                  <div style="margin-top:6px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Aktion</span><span style="font-weight:700;">${safe(data.planned_action)}</span></div>
                </div>`;
            ]]]

      - type: custom:button-card
        entity: sensor.kuehlgeraet_cockpit_status
        show_name: false
        show_state: false
        show_icon: false
        styles:
          card:
            - padding: 16px
            - border-radius: 20px
            - border: 1px solid rgba(255,255,255,0.10)
            - background: linear-gradient(180deg, rgba(20,20,28,0.96), rgba(11,12,16,0.96))
          grid:
            - grid-template-areas: 'body'
            - grid-template-columns: 1fr
          custom_fields:
            body:
              - justify-self: stretch
              - align-self: stretch
        custom_fields:
          body: |
            [[[ 
              const data = entity?.attributes || {};
              const safe = (v, fallback='-') => (v === undefined || v === null || v === '') ? fallback : v;
              return `
                <div style="font-family:Consolas, 'Courier New', monospace;color:#eef8ff;">
                  <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
                    <div style="font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#f4f5ff;">Kuehlmodul</div>
                    <ha-icon icon="mdi:snowflake-thermometer" style="width:18px;height:18px;color:#f4f5ff;"></ha-icon>
                  </div>
                  <div style="margin-top:14px;display:grid;grid-template-columns:repeat(2, minmax(0,1fr));gap:10px;">
                    <div style="padding:10px;border-radius:14px;background:rgba(255,255,255,0.06);">
                      <div style="font-size:10px;opacity:0.68;text-transform:uppercase;">Basis EIN</div>
                      <div style="margin-top:4px;font-size:20px;font-weight:800;">${safe(data.selected_on_temp)} C</div>
                    </div>
                    <div style="padding:10px;border-radius:14px;background:rgba(255,255,255,0.06);">
                      <div style="font-size:10px;opacity:0.68;text-transform:uppercase;">Basis AUS</div>
                      <div style="margin-top:4px;font-size:20px;font-weight:800;">${safe(data.selected_off_temp)} C</div>
                    </div>
                  </div>
                  <div style="margin-top:12px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Effektiv EIN</span><span style="font-weight:700;">${safe(data.effective_on_temp)} C</span></div>
                  <div style="margin-top:6px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Effektiv AUS</span><span style="font-weight:700;">${safe(data.effective_off_temp)} C</span></div>
                  <div style="margin-top:6px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Messwert</span><span style="font-weight:700;">${safe(data.temperature_c)} C</span></div>
                </div>`;
            ]]]

      - type: custom:button-card
        entity: sensor.kuehlgeraet_cockpit_status
        show_name: false
        show_state: false
        show_icon: false
        styles:
          card:
            - padding: 16px
            - border-radius: 20px
            - border: 1px solid rgba(255,255,255,0.10)
            - background: linear-gradient(180deg, rgba(24,23,17,0.96), rgba(14,13,9,0.96))
          grid:
            - grid-template-areas: 'body'
            - grid-template-columns: 1fr
          custom_fields:
            body:
              - justify-self: stretch
              - align-self: stretch
        custom_fields:
          body: |
            [[[ 
              const data = entity?.attributes || {};
              const safe = (v, fallback='-') => (v === undefined || v === null || v === '') ? fallback : v;
              return `
                <div style="font-family:Consolas, 'Courier New', monospace;color:#eef8ff;">
                  <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
                    <div style="font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:#ffe29a;">Logikmodul</div>
                    <ha-icon icon="mdi:state-machine" style="width:18px;height:18px;color:#ffe29a;"></ha-icon>
                  </div>
                  <div style="margin-top:14px;padding:12px;border-radius:14px;background:rgba(255,255,255,0.06);">
                    <div style="font-size:10px;opacity:0.68;text-transform:uppercase;">Grund</div>
                    <div style="margin-top:6px;font-size:13px;line-height:1.55;">${safe(data.reason)}</div>
                  </div>
                  <div style="margin-top:12px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Lookahead</span><span style="font-weight:700;">${safe(data.lookahead_hours)} h</span></div>
                  <div style="margin-top:6px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Billigste Stunden</span><span style="font-weight:700;">${safe(data.cheapest_hours_count)}</span></div>
                  <div style="margin-top:6px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Kurzfristfenster</span><span style="font-weight:700;">${safe(data.near_term_hours)} h</span></div>
                  <div style="margin-top:6px;font-size:13px;display:flex;justify-content:space-between;"><span style="opacity:0.7;">Update</span><span style="font-weight:700;">${safe(data.updated)}</span></div>
                </div>`;
            ]]]
